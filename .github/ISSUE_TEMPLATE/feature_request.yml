name: Feature request
description: Propose a new feature or enhancement
labels: [enhancement]
body:
  - type: textarea
    attributes:
      label: Problem
      description: What problem would this feature solve?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed solution
      description: How should it work?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives considered
